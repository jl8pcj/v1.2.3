<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI 完全版</title>
<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h2{margin-bottom:10px;}
#status{font-size:18px;margin-bottom:15px;}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;}
.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}
button{font-size:16px;padding:10px 16px;margin-right:10px;cursor:pointer;}
.channelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px;padding:10px;background:#151515;border:1px solid #333;width:200px;}
.sliderRow{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;}
.sliderRow input{width:40%;}
.meterContainer{
  position:relative;
  width:500px;
  height:500px;
  margin:10px 0 0 0px;
}

/* D/K リング（図形は絶対に変更しない） */
.ring{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

/* 黒丸 */
.ring.d .ringInner,
.ring.k .ringInner{
  position:absolute;
  width:320px;
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
  z-index:2;
}

/* 外周バーコンテナ */
.ringContent{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
  overflow:hidden;
}

/* 左半円 */
.ring.d .ringContent{
  clip-path: polygon(0 0, calc(50% - 5px) 0, calc(50% - 5px) 100%, 0 100%);
  background:#222;
}

/* 右半円 */
.ring.k .ringContent{
  clip-path: polygon(calc(50% + 5px) 0, 100% 0, 100% 100%, calc(50% + 5px) 100%);
  background:#222;
}

/* バー（高さは使わないが図形は残す） */
.ringContent .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:#222;
  transition:background 0.03s linear;
}

/* peakBar → 非表示にする（図形は残す） */
.ringContent .peakBar{
  display:none;
}

/* F/J 中央（図形そのまま） */
.circleContainer{
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:flex-end;
}
.meterWrap.f,.meterWrap.j{
  position:relative;
  height:300px;
  overflow:hidden;
  background:#222;
}
.meterWrap.f{
  width:145px;
  border-radius:150px 0 0 150px;
  margin-right:5px;
}
.meterWrap.j{
  width:145px;
  border-radius:0 150px 150px 0;
  margin-left:5px;
}
.meterWrap.f .meterBar,.meterWrap.j .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:#222;
  transition:background 0.03s linear;
}
.meterWrap.f .peakBar,.meterWrap.j .peakBar{
  display:none;
}

/* メッセージボックス */
#messageBox{
  position:absolute;
  left:250px;
  top:70%;
  transform:translate(260px,-50%);
  width:450px;
  height:600px;
  background:#111;
  color:#0f0;
  border:1px solid #333;
  padding:6px;
  font-size:14px;
  font-family:sans-serif;
  resize:none;
  overflow-y:auto;
}

#channels{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  max-width:700px;
  margin:10px 0 0 0px;
}

.topRow{
  display:flex;
  justify-content:space-between; /* 左右に分ける */
  align-items:center;
  width:100%;
}

.rightGroup{
  display:flex;
  align-items:center;
  gap:15px; /* ステータスとボタンの間隔 */
}
</style>
</head>
<body>
<div class="topRow">
  <h2>Doncon 感度調整</h2>

  <div class="rightGroup">
    <div id="status">
      <span id="led" class="dot red"></span>
      <span id="statText">DISCONNECTED</span>
    </div>

    <button id="connectBtn">接続</button>
    <button id="saveBtn">SAVE</button>
  </div>
</div>

<!-- ミュート設定 -->
<div style="margin-top:20px; max-width:800px;">
  <div class="sliderRow">
    <label>ドンを叩いたとき カッを受け付けない時間(ms)</label>
    <input id="mute_fj" type="range" min="0" max="50" step="1"
           oninput="sendParam(-1,this.value,'mute_fj')">
  </div>

  <div class="sliderRow">
    <label>カッを叩いたとき ドンを受け付けない時間(ms)</label>
    <input id="mute_dk" type="range" min="0" max="50" step="1"
           oninput="sendParam(-1,this.value,'mute_dk')">
  </div>
</div>

<div id="channels"></div>
<div class="meterContainer" id="meterContainer"></div>

<script>
let port, reader, writer;
let lastReceive=0;
const names=["左カッ","左ドン","右ドン","右カッ"];
const led=document.getElementById("led");
const statText=document.getElementById("statText");
const channels=document.getElementById("channels");
const connectBtn=document.getElementById("connectBtn");
const saveBtn=document.getElementById("saveBtn");
const meterContainer=document.getElementById("meterContainer");

function setStatus(text,color){
  statText.textContent=text;
  led.className="dot "+color;
}

/* ================= CONNECT ================= */
connectBtn.onclick=async()=>{
  try{
    setStatus("CONNECTING...","yellow");
    port=await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    writer=port.writable.getWriter();
    reader=port.readable.getReader();
    createUI();
    setStatus("CONNECTED","green");
    startRead();
    send({cmd:"get_settings"});
  }catch(e){
    console.error(e);
    setStatus("FAILED","red");
  }
};

/* ================= UI ================= */
function createUI(){
  channels.innerHTML="";
  meterContainer.innerHTML="";

  // Dリング
  const dRing=document.createElement("div");
  dRing.className="ring d";
  const dInner=document.createElement("div");
  dInner.className="ringInner";
  const dContent=document.createElement("div");
  dContent.className="ringContent";
  const dBar=document.createElement("div");
  dBar.className="meterBar";
  dBar.id="bar0";
  dContent.appendChild(dBar);
  dRing.appendChild(dInner);
  dRing.appendChild(dContent);
  meterContainer.appendChild(dRing);

  // Kリング
  const kRing=document.createElement("div");
  kRing.className="ring k";
  const kInner=document.createElement("div");
  kInner.className="ringInner";
  const kContent=document.createElement("div");
  kContent.className="ringContent";
  const kBar=document.createElement("div");
  kBar.className="meterBar";
  kBar.id="bar3";
  kContent.appendChild(kBar);
  kRing.appendChild(kInner);
  kRing.appendChild(kContent);
  meterContainer.appendChild(kRing);

  // F/J 中央
  const circleContainer=document.createElement("div");
  circleContainer.className="circleContainer";

  const fWrap=document.createElement("div");
  fWrap.className="meterWrap f";
  const fBar=document.createElement("div");
  fBar.className="meterBar";
  fBar.id="bar1";
  fWrap.appendChild(fBar);

  const jWrap=document.createElement("div");
  jWrap.className="meterWrap j";
  const jBar=document.createElement("div");
  jBar.className="meterBar";
  jBar.id="bar2";
  jWrap.appendChild(jBar);

  circleContainer.appendChild(fWrap);
  circleContainer.appendChild(jWrap);
  meterContainer.appendChild(circleContainer);

  // メッセージボックス
  const msgBox = document.createElement("textarea");
  msgBox.id = "messageBox";
  msgBox.placeholder = "接続を押してポートを選択してください\n\n\n gain \n値を大きくすると、小さい打撃でもバーが大きく上がる（敏感になる）\n値を小さくすると、大きく叩かないとバーが上がらない（鈍感になる）\n\n threshold\n値が低いと、ちょっとした振動や誤反応でもバーが上がる\n値が高いと、しっかり叩いたときしかバーが上がらない\n\n\n\nGP15のジャンパーピン”接続”でcode.py改変\n通常は”open”にしておいてください";
  meterContainer.appendChild(msgBox);

  // gain / threshold
  for(let i=0;i<4;i++){
    const div=document.createElement("div");
    div.className="channelCard";
    div.innerHTML=`<h3>${names[i]}</h3>
      <div class="sliderRow vertical">
        <label>gain</label>
        <input type="range" min="0.5" max="5" step="0.1" value="1"
               oninput="sendParam(${i},this.value,'gain')">
      </div>
      <div class="sliderRow vertical">
        <label>threshold</label>
        <input type="range" min="1000" max="40000" step="500" value="15000"
               oninput="sendParam(${i},this.value,'threshold')">
      </div>`;
    channels.appendChild(div);
  }
}

/* ================= SEND ================= */
function send(obj){
  if(writer)
    writer.write(new TextEncoder().encode(JSON.stringify(obj)+"\n"));
}

function sendParam(ch,val,type){
  send({cmd:"set", ch:ch, type:type, value:parseFloat(val)});
}

saveBtn.onclick=()=>{
  setStatus("SAVING","yellow");
  send({cmd:"save"});
};

/* ================= 簡易メーター ================= */
function updateMeter(ch, value){
  const bar = document.getElementById("bar" + ch);

  // threshold は UI のスライダーで設定されている
  const threshold = parseFloat(
    document.querySelectorAll(".sliderRow input")[2 + ch*2 + 1].value
  );

  // threshold を超えたら発光
  if(value > threshold){
    if(ch === 0 || ch === 3){
      bar.style.background = "#00ff66";  // D/K → 緑
    }else{
      bar.style.background = "#ff4444";  // F/J → 赤
    }
  }else{
    bar.style.background = "#222";       // 入力なし
  }
}


/* ================= READ ================= */
async function startRead(){
  const decoder=new TextDecoder();
  let buffer="";
  while(true){
    const {value,done}=await reader.read();
    if(done){
      setStatus("DISCONNECTED","red");
      break;
    }
    lastReceive=Date.now();
    buffer+=decoder.decode(value);
    let lines=buffer.split("\n");
    buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith("{")) continue;
      try{
        const data=JSON.parse(line);

        if(data.type==="adc"){
          updateMeter(data.ch,data.value);
        }

        if(data.type==="settings"){
          const sliders=document.querySelectorAll(".sliderRow input");

          document.getElementById("mute_fj").value=data.mute_fj;
          document.getElementById("mute_dk").value=data.mute_dk;

          for(let i=0;i<4;i++){
            sliders[2 + i*2].value=data.gain[i];
            sliders[2 + i*2 + 1].value=data.threshold[i];
          }

          setStatus("SETTINGS LOADED","green");
        }

      }catch(e){}
    }
  }
}

/* ================= WATCHDOG ================= */
setInterval(()=>{
  if(Date.now()-lastReceive>1500)
    setStatus("NO DATA","red");
},500);

</script>
</body>
</html>
