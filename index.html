<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 太鼓アーケードUI 完全版</title>
<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h2{margin-bottom:10px;}
#status{font-size:18px;margin-bottom:15px;}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;}
.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}
button{font-size:16px;padding:10px 16px;margin-right:10px;cursor:pointer;}
.channelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px;padding:10px;background:#151515;border:1px solid #333;width:200px;}
.sliderRow{display:flex;justify-content:space-between;width:100%;margin-bottom:10px;}
.sliderRow input{width:48%;}
.meterContainer{
  position:relative;
  width:500px;
  height:500px;
  margin:10px 0 0 0px;
}

/* D/K リング */
.ring{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
}

/* ドーナツの中部分（黒） */
.ring.d .ringInner,
.ring.k .ringInner{
  position:absolute;
  width:320px;
  height:320px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#0b0b0b;
  z-index:2;
}

/* 外周バーコンテナ */
.ringContent{
  position:absolute;
  width:450px;
  height:450px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
  overflow:hidden;
}

/* D 左半分 */
.ring.d .ringContent{
  clip-path: polygon(0 0, calc(50% - 5px) 0, calc(50% - 5px) 100%, 0 100%);
  background:#222;
}

/* K 右半分 */
.ring.k .ringContent{
  clip-path: polygon(calc(50% + 5px) 0, 100% 0, 100% 100%, calc(50% + 5px) 100%);
  background:#222;
}

/* バー */
.ringContent .meterBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  transition:height 0.02s linear, background 0.05s linear;
  background:linear-gradient(to top,#00ff88,#00cc66);
}

/* peak */
.ringContent .peakBar{
  position:absolute;
  bottom:0;
  width:100%;
  height:3px;
  background:#fff;
  z-index:3;
}

/* F/J 中央 */
.circleContainer{
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content
